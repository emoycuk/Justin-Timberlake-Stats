    <style>
        .analytics-container { padding: 120px 5% 50px; color: #fff; max-width: 1300px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }
        .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .hero-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 168, 83, 0.2); padding: 30px; border-radius: 12px; position: relative; overflow: hidden; }
        .hero-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-bronze, #d4a853); }
        .hero-value { font-size: 2.6rem; font-weight: 700; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 10px 0; }
        .hero-sub { color: #d4a853; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.9rem; font-weight: 700;}
        
        .tour-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .tour-row { display: grid; grid-template-columns: 2fr 1fr 1.5fr 1.5fr; gap: 15px; background: rgba(255,255,255,0.02); padding: 25px; border-radius: 8px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.3s; }
        .tour-row:hover { background: rgba(255,255,255,0.05); }
        
        .tour-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #fff; }
        .tour-type { font-family: 'Space Grotesk', sans-serif; color: #d4a853; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 8px; }
        .tour-years { font-family: 'Space Grotesk', sans-serif; color: #888; font-size: 0.9rem; margin-top: 5px; }
        
        .stat-box { display: flex; flex-direction: column; }
        .stat-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 5px; }
        .stat-number { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 500; }
        
        .gross-number { color: #4ade80; font-weight: 700; font-size: 1.5rem; }

        /* Sadece Lifetime Gross kutusunun rakam boyutunu küçültür ve sıkıştırır */
        #lifetime-gross {
            font-size: 2.6rem; /* 3.5rem'den 2.6'ya düşürdük */

<body>

    <div class="analytics-container">
        <div style="margin-bottom: 10px;">

        <div class="hero-stats">
            <div class="hero-card">
                <div class="hero-sub">Lifetime Career Gross</div>
                <div class="hero-value" id="lifetime-gross" style="color: #4ade80;">$0</div>
                <div style="color: #888;">Actual unadjusted ticket sales</div>
            </div>
            <div class="hero-card">
                <div class="hero-sub">Total Tickets Sold</div>
                <div class="hero-value" id="lifetime-tickets">0</div>
                <div style="color: #888;">Across 8 major world tours</div>
            </div>
            <div class="hero-card">
                <div class="hero-sub">Total Shows Played</div>
                <div class="hero-value" id="lifetime-shows">0</div>
                <div style="color: #888;">Arenas and Stadiums globally</div>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <h2 style="font-family: 'Playfair Display'; margin-bottom: 20px; color: #d4a853;">Tour Breakdown</h2>
            <div class="tour-grid" id="tour-list">
                </div>
        </div>

    </div>

    <script>
        // --- GÜNCEL VE ARŞİV TURNE VERİ TABANI ---
        const tourData = [
            {
                name: "The Forget Tomorrow World Tour",
                years: "2024 - 2026",
                shows: 94, 
                tickets: 1254199, 
                gross: 205200000, 
                type: "Solo World Tour"
            },
            {
                name: "The Man of the Woods Tour",
                years: "2018 - 2019",
                shows: 115,
                tickets: 1759812,
                gross: 226300000,
                type: "Solo World Tour"
            },
            {
                name: "The 20/20 Experience World Tour",
                years: "2013 - 2015",
                shows: 134,
                tickets: 1900000,
                gross: 231600000,
                type: "Solo World Tour"
            },
            {
                name: "Legends of the Summer Stadium Tour",
                years: "2013",
                shows: 14,
                tickets: 622559,
                gross: 75300000,
                type: "Co-Headlining w/ Jay-Z"
            },
            {
                name: "FutureSex/LoveShow",
                years: "2007",
                shows: 119,
                tickets: 1600000,
                gross: 126800000,
                type: "Solo World Tour"
            },
            {
                name: "The Justified World Tour",
                years: "2003 - 2004",
                shows: 65,
                tickets: 850000,
                gross: 45000000,
                type: "Solo World Tour"
            },
            {
                name: "Justified and Stripped Tour",
                years: "2003",
                shows: 45,
                tickets: 546483,
                gross: 30200000,
                type: "Co-Headlining w/ Christina Aguilera"
            },
            {
                name: "I'm Lovin' It Promo Tour",
                years: "2003",
                shows: 11,
                tickets: 50000,
                gross: 6000000,
                type: "McDonald's Sponsored European Tour"
            }
        ];

        function animateNumber(obj, start, end, duration, isCurrency = false) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = Math.floor(progress * (end - start) + start);
                
                if (isCurrency && end >= 1000000000) {
                    obj.innerHTML = "$" + (current / 1000000000).toFixed(3) + 'B';
                } else if (isCurrency) {
                    obj.innerHTML = "$" + current.toLocaleString('en-US');
                } else {
                    obj.innerHTML = current.toLocaleString('en-US');
                }
                
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function initToursDashboard() {
            let totalGross = 0;
            let totalTickets = 0;
            let totalShows = 0;
            const tourListDiv = document.getElementById('tour-list');

            tourData.forEach(tour => {
                totalGross += tour.gross;
                totalTickets += tour.tickets;
                totalShows += tour.shows;

                let row = document.createElement('div');
                row.className = 'tour-row';
                
                row.innerHTML = `
                    <div>
                        <div class="tour-name">${tour.name}</div>
                        <div class="tour-type">${tour.type}</div>
                        <div class="tour-years">${tour.years}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-title">Shows</div>
                        <div class="stat-number">${tour.shows}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-title">Tickets Sold</div>
                        <div class="stat-number">${tour.tickets.toLocaleString()}</div>
                    </div>
                    <div class="stat-box" style="text-align: right;">
                        <div class="stat-title">Total Gross</div>
                        <div class="stat-number gross-number">$${(tour.gross / 1000000).toFixed(1)}M</div>
                    </div>
                `;
                tourListDiv.appendChild(row);
            });

            // Animasyonları tetikle
            animateNumber(document.getElementById('lifetime-gross'), 0, totalGross, 2000, true);
            animateNumber(document.getElementById('lifetime-tickets'), 0, totalTickets, 2000, false);
            animateNumber(document.getElementById('lifetime-shows'), 0, totalShows, 2000, false);
        }

        document.addEventListener('DOMContentLoaded', initToursDashboard);
    </script>
    <script src="fab.js?v=1.2" defer></script>
