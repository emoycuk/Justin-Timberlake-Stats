    </noscript>
    <link rel="stylesheet" href="style.css?v=1774568654">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
        }

        /* HERO */
        #album-hero {
            position: relative;
            width: 100%;
            height: 420px;
            overflow: hidden;
            margin-top: 64px;
        }

        #hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            filter: brightness(0.35);
            transition: background-image 0.3s;
        }

        #hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 20%, #0a0a0a 100%);
        }

        #hero-content {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            padding: 40px 6%;
            gap: 32px;
        }

        #hero-cover {
            width: 160px;
            height: 160px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        #hero-text {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #hero-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--era-color, #d4a853);
        }

        #hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.1;
        }

        #hero-year {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
        }

        /* MAIN CONTENT */
        .album-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 6% 80px;
            position: relative;
            z-index: 1;
        }

        .album-page::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.6);
            z-index: -1;
            pointer-events: none;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 20px 18px;
        }

        .stat-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--era-color, #d4a853);
        }

        .stat-sub {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 3px;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* SECTION HEADER */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
        }

        /* TRACK TABLE */
        .track-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Space Grotesk', sans-serif;
        }

        .track-table th {
            text-align: left;
            padding: 10px 12px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .track-table td {
            padding: 13px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.88rem;
        }

        .track-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .track-rank {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 700;
            width: 32px;
            white-space: nowrap;
        }

        .track-name {
            color: #fff;
            font-weight: 500;
        }

        .track-total {
            color: var(--era-color, #d4a853);
            font-weight: 700;
        }

        .track-daily {
            color: #4ade80;
            font-size: 0.8rem;
        }

        .track-bar-cell {
            width: 160px;
        }

        .track-bar-bg {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            height: 4px;
            width: 100%;
        }

        .track-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--era-color, #d4a853);
            transition: width 0.6s ease;
        }

        /* LOADING */
        #loading {
            text-align: center;
            padding: 80px;
            font-family: 'Space Grotesk', sans-serif;
            color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            #hero-title {
                font-size: 2rem;
            }

            #hero-cover {
                width: 100px;
                height: 100px;
            }

            .track-bar-cell {
                display: none;
            }

            .track-table td,
            .track-table th {
                padding: 10px 8px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">Timberlake</div>
        <ul class="nav-links">
            <li><a href="index.html">← Back</a></li>
            <li><a href="streams.html">Streams</a></li>
            <li><a href="awards.html">Awards</a></li>
            <li><a href="game.html">Album Crush</a></li>
            <li><a href="transform.html">Timbertrix</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <div id="album-hero">
        <div id="hero-bg"></div>
        <div id="hero-gradient"></div>
        <div id="hero-content">
            <img id="hero-cover" src="" alt="Album Cover">
            <div id="hero-text">
                <div id="hero-label">Album Analysis</div>
                <div id="hero-title">—</div>
                <div id="hero-year">—</div>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="album-page">
        <div id="loading">Loading data...</div>
        <div id="album-content" style="display:none;">

            <!-- STATS -->
            <div class="stats-grid" id="stats-grid"></div>

            <!-- TRACKS -->
            <div>
                <div class="section-title">Track Performance</div>
                <div style="overflow-x:auto;">
                    <table class="track-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Track</th>
                                <th>Total Streams</th>
                                <th>Daily</th>
                                <th class="track-bar-cell"></th>
                            </tr>
                        </thead>
                        <tbody id="track-tbody"></tbody>
                    </table>
                </div>
                <div id="track-status"
                    style="font-family:'Space Grotesk',sans-serif;font-size:0.75rem;color:rgba(255,255,255,0.25);margin-top:16px;">
                </div>
            </div>
        </div>
    </div>

    <script src="config.js?v=1.2" defer></script>
    <script src="song-map.js?v=1.2" defer></script>
    <script src="album.js?v=1.2" defer></script>
</body>

</html>
