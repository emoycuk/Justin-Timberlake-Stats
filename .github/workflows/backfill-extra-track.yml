name: Backfill Extra Track (one-off)

# Manuel tetikleme — bir kere çalıştır, sonra bu dosyayı silebilirsin.
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node.js 24 kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Bağımlılıkları yükle
        run: npm install
        working-directory: scripts

      - name: 12-22 Nisan snapshotlarına "4 Minutes" track'ini ekle
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node backfill-extra-track.js
        working-directory: scripts
